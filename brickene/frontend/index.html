<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brickene Frontend</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell" id="editor-root">
      <header class="menu-region" aria-label="Application menu">
        <div class="menu-row">
          <div class="menu-actions-wrap">
            <nav class="menu-actions" aria-label="Primary navigation">
              <button type="button" class="menu-button is-active" data-menu="file">File</button>
              <button type="button" class="menu-button" data-menu="edit">Edit</button>
              <button type="button" class="menu-button" data-menu="node">Node</button>
              <button type="button" class="menu-button" data-menu="view">View</button>
            </nav>

            <div id="submenu-dropdown" class="submenu-dropdown" aria-label="Sub-menu placeholder">
              <div id="submenu-content" class="submenu-content" role="menu"></div>
            </div>
          </div>

          <div class="brand-block">
            <h1>BRICKENE</h1>
          </div>

          <div class="menu-meta">
            <p id="menu-version" class="menu-version">v0.4.3</p>
          </div>
        </div>
      </header>

      <main class="canvas-region" aria-label="Canvas workspace">
        <input id="graph-file-input" type="file" accept=".brickene,application/json" hidden />
        <div id="canvas-viewport" class="canvas-viewport" tabindex="-1">
          <div class="canvas-zoom-controls" aria-label="Canvas zoom controls">
            <button id="canvas-zoom-in" type="button" class="canvas-zoom-button" aria-label="Zoom in">+</button>
            <button id="canvas-zoom-out" type="button" class="canvas-zoom-button" aria-label="Zoom out">-</button>
            <button
              id="canvas-zoom-reset"
              type="button"
              class="canvas-zoom-button canvas-zoom-button-reset"
              aria-label="Reset zoom"
            >
              <img
                class="canvas-zoom-button-icon"
                src="./assets/images/reset.svg"
                alt=""
                aria-hidden="true"
              />
            </button>
          </div>
          <p id="menu-state-copy" class="menu-status-copy" aria-live="polite">
            Menu commands are scaffolded for future integration.
          </p>
          <div id="canvas-layer" class="canvas-layer" aria-label="Canvas layer">
            <div class="canvas-grid" aria-hidden="true"></div>
            <div class="canvas-plane" aria-hidden="true">
              <div class="canvas-origin-marker"></div>
              <div class="canvas-axis canvas-axis-horizontal"></div>
              <div class="canvas-axis canvas-axis-vertical"></div>
            </div>
          </div>

          <section id="component-layer" class="component-layer" aria-label="Component layer">
            <div id="component-world" class="component-world">
              <svg id="edge-layer" class="edge-layer" aria-hidden="true"></svg>
              <div id="node-container" class="node-container" aria-live="polite"></div>
            </div>
            <div id="selection-rect" class="selection-rect" aria-hidden="true"></div>
          </section>

          <section id="render-layer" class="render-layer" aria-label="Render layer">
            <div id="render-preview-window" class="render-preview-window">
              <p class="render-preview-label">Render preview</p>
              <div class="render-preview-frame" aria-hidden="true">
                <img id="render-preview-image" class="render-preview-image" alt="Rendered graph preview" hidden />
              </div>
              <p id="render-preview-meta" class="render-preview-meta">Awaiting preview refresh.</p>
            </div>
          </section>

          <div id="canvas-context-menu" class="canvas-context-menu" role="menu" aria-label="Canvas context menu">
            <div
              id="canvas-node-portal"
              class="context-menu-portal"
              data-portal-key="canvas-node-categories"
            >
              <button
                id="canvas-node-portal-trigger"
                type="button"
                class="context-menu-item context-menu-portal-trigger"
                aria-haspopup="true"
                aria-expanded="false"
              >
                Create new node
              </button>
              <div
                id="canvas-node-category-menu"
                class="context-portal-menu context-portal-menu-secondary"
                role="menu"
                aria-label="Node categories"
              ></div>
            </div>
            <button type="button" class="context-menu-item" data-action="center">Center canvas</button>
            <div class="menu-separator context-menu-separator" role="separator"></div>
            <button type="button" class="context-menu-item" data-action="close">Close menu</button>
          </div>

          <div id="node-context-menu" class="node-context-menu" role="menu" aria-label="Node context menu">
            <button type="button" class="context-menu-item node-context-item" data-action="delete">Delete node</button>
            <div class="menu-separator context-menu-separator" role="separator"></div>
            <button type="button" class="context-menu-item node-context-item" data-action="close">Close menu</button>
          </div>

          <div id="edge-context-menu" class="edge-context-menu" role="menu" aria-label="Edge context menu">
            <button type="button" class="context-menu-item edge-context-item" data-action="delete">Delete edge</button>
            <div class="menu-separator context-menu-separator" role="separator"></div>
            <button type="button" class="context-menu-item edge-context-item" data-action="close">Close menu</button>
          </div>

          <div id="port-command-panel" class="port-command-panel" hidden>
            <label class="port-command-label" for="port-command-input">Port command</label>
            <input
              id="port-command-input"
              class="port-command-input"
              type="text"
              placeholder="Search nodes by name or alias"
              autocomplete="off"
              spellcheck="false"
            />
            <div id="port-command-list" class="port-command-list" role="listbox" aria-label="Port command matches"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="./scripts/state.js"></script>
    <script src="./scripts/brick-configs.js"></script>
    <script src="./scripts/menu.js"></script>
    <script src="./scripts/geometry.js"></script>
    <script src="./scripts/nodes.js"></script>
    <script src="./scripts/edges.js"></script>
    <script src="./scripts/persistence.js"></script>
    <script src="./scripts/render-layer.js"></script>
    <script src="./scripts/canvas.js"></script>
    <script src="./app.js"></script>

    <!--
      SCALE PARAMETER
      Append ?scale=<ratio> to the page URL to resize all UI components
      proportionally.  Example: index.html?scale=0.5

      The same parameter is forwarded from iframe-example-small.html so the
      editor can be embedded at a reduced size inside a narrower host frame.
    -->
    <script>
      (function applyScaleParam() {
        const raw = new URLSearchParams(location.search).get("scale");
        const scale = parseFloat(raw);
        if (!raw || isNaN(scale) || scale <= 0 || scale === 1) return;

        const root = document.getElementById("editor-root");
        root.style.transformOrigin = "top left";
        root.style.transform = `scale(${scale})`;
        root.style.width = `${100 / scale}%`;
        root.style.height = `${100 / scale}vh`;
      })();
    </script>

    <!--
      IFRAME HOST BRIDGE
      Implements the postMessage protocol so this page can be embedded in a
      host frame (e.g. cabbage_labeling).

      Inbound (host → editor):
        { type: "brickene:requestSmiles" }
        { type: "brickene:requestGraphState" }
        { type: "brickene:loadGraphState", graph }
        { type: "brickene:clearPage" }

      Outbound (editor → host):
        { type: "brickene:smiles",            requestType, timestamp, smiles }
        { type: "brickene:graphState",         requestType, timestamp, graph  }
        { type: "brickene:graphStateChanged",  smiles, graph }
        { type: "brickene:keydown",            key, ctrlKey, metaKey, shiftKey, altKey }
        { type: "brickene:error",              requestType, timestamp, message }
    -->
    <script>
      (function brickeneIframeBridge() {
        // Only activate when actually embedded in a parent frame.
        if (window === window.parent) return;

        const frontend = window.BrickeneFrontend;

        // ── Inbound postMessage handler ───────────────────────────────
        window.addEventListener("message", async (event) => {
          const data = event.data;
          if (!data || typeof data.type !== "string" || !data.type.startsWith("brickene:")) return;

          if (data.type === "brickene:requestSmiles") {
            try {
              const smiles = (await frontend.fetchGraphSmilesText()).trim();
              window.parent.postMessage({
                type: "brickene:smiles",
                requestType: "brickene:requestSmiles",
                timestamp: Date.now(),
                smiles,
              }, "*");
            } catch (err) {
              window.parent.postMessage({
                type: "brickene:error",
                requestType: "brickene:requestSmiles",
                timestamp: Date.now(),
                message: err instanceof Error ? err.message : "SMILES export failed.",
              }, "*");
            }
            return;
          }

          if (data.type === "brickene:requestGraphState") {
            window.parent.postMessage({
              type: "brickene:graphState",
              requestType: "brickene:requestGraphState",
              timestamp: Date.now(),
              graph: frontend.exportGraphState(),
            }, "*");
            return;
          }

          if (data.type === "brickene:loadGraphState") {
            try { frontend.importGraphState(data.graph); } catch (_) {}
            return;
          }

          if (data.type === "brickene:clearPage") {
            try { frontend.importGraphState({ version: 1, nodes: [], edges: [] }); } catch (_) {}
          }
        });

        // ── Graph-change → parent ─────────────────────────────────────
        // Debounce so rapid edits only fire one postMessage.
        let _changeTimer = null;
        const viewport = frontend.dom.canvasViewport;
        if (viewport) {
          viewport.addEventListener(frontend.GRAPH_CHANGE_EVENT, () => {
            clearTimeout(_changeTimer);
            _changeTimer = setTimeout(async () => {
              const graph = frontend.exportGraphState();
              let smiles = "";
              try { smiles = (await frontend.fetchGraphSmilesText()).trim(); } catch (_) {}
              window.parent.postMessage({ type: "brickene:graphStateChanged", smiles, graph }, "*");
            }, 300);
          });
        }

        // ── Keyboard shortcut forwarding ──────────────────────────────
        // Arrow keys and Ctrl/Cmd+S are not used by the canvas editor but
        // ARE used by the host page (navigation and save).  Capture them
        // here and relay them to the parent so the host shortcuts still work
        // while the brickene frame has focus.
        document.addEventListener("keydown", (event) => {
          if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
            window.parent.postMessage({
              type: "brickene:keydown",
              key: event.key,
              ctrlKey: event.ctrlKey,
              metaKey: event.metaKey,
              shiftKey: event.shiftKey,
              altKey: event.altKey,
            }, "*");
            return;
          }
          // Ctrl/Cmd+S (without Shift, which brickene uses for its own SMILES copy)
          if ((event.ctrlKey || event.metaKey) && !event.altKey && !event.shiftKey && event.key.toLowerCase() === "s") {
            event.preventDefault();
            window.parent.postMessage({
              type: "brickene:keydown",
              key: "s",
              ctrlKey: event.ctrlKey,
              metaKey: event.metaKey,
              shiftKey: false,
              altKey: false,
            }, "*");
          }
        }, true); // capture phase — runs before canvas.js bubble-phase listeners
      })();
    </script>
  </body>
</html>
